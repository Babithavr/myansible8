- name: deploy to tomcat
  hosts: web
  become: yes
  
  tasks:
  
    - name: copy war file
      copy:
        src: "/var/snap/jenkins/5013/workspace/myansible8-CICD/target/myansible8.war"
        dest: "/opt/tomcat/webapps/myansible8.war"
        remote_src: no
        
    - name: stop tomcat
      shell: /opt/tomcat/bin/shutdown.sh
      ignore_errors: yes
      
    - name: start tomcat
      shell: /opt/tomcat/bin/startup.sh
        
